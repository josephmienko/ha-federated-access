system:
  timezone: "America/Los_Angeles"
  state_dir: "/var/lib/ha-federated-access"
  log_dir: "/var/log/ha-federated-access"

network:
  pi:
    deploy_host: "homeassistant.local"
    expected_primary_ip: "192.168.1.10"
    interfaces:
      - name: "eth0"
        ip: "192.168.1.10"

homeassistant:
  config_dir: "/opt/homeassistant/config"
  port: 8123
  container_name: "homeassistant"
  compose:
    root: "/opt/homeassistant"
    file: "/opt/homeassistant/compose.yaml"
    env_file: "/opt/homeassistant/.env"
    service: "homeassistant"

netbird:
  enabled: true
  stack_root: "/opt/ha-federated-access/netbird"
  compose_service_name: "ha-federated-access-netbird.service"
  compose_file: "/opt/ha-federated-access/netbird/docker-compose.yaml"
  compose_env_file: "/opt/ha-federated-access/netbird/.env"
